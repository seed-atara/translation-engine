[build]
builder = "NIXPACKS"
buildCommand = "npm run build && npm run db:generate"

[deploy]
startCommand = "npm run db:migrate && npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "lingua-app"

[[services]]
name = "lingua-db"
plugin = "postgresql"
